<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/><line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Credit card icon -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="180" height="120" rx="16" ry="16" fill="url(#accent)" opacity="0.9"/>
    <rect x="0" y="0" width="180" height="120" rx="16" ry="16" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <!-- Chip -->
    <rect x="24" y="30" width="40" height="30" rx="6" fill="url(#chip)"/>
    <line x1="24" y1="41" x2="64" y2="41" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="24" y1="51" x2="64" y2="51" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="44" y1="30" x2="44" y2="60" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <!-- Card stripe -->
    <rect x="0" y="76" width="180" height="18" fill="#fff" opacity="0.08"/>
    <!-- Dots for card number -->
    <g fill="#fff" opacity="0.5">
      <circle cx="24" cy="102" r="2.5"/><circle cx="34" cy="102" r="2.5"/><circle cx="44" cy="102" r="2.5"/><circle cx="54" cy="102" r="2.5"/>
      <circle cx="72" cy="102" r="2.5"/><circle cx="82" cy="102" r="2.5"/><circle cx="92" cy="102" r="2.5"/><circle cx="102" cy="102" r="2.5"/>
      <circle cx="120" cy="102" r="2.5"/><circle cx="130" cy="102" r="2.5"/><circle cx="140" cy="102" r="2.5"/><circle cx="150" cy="102" r="2.5"/>
    </g>
    <!-- Arrow coming out -->
    <line x1="190" y1="60" x2="240" y2="60" stroke="#667eea" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <polygon points="244,52 260,60 244,68" fill="#667eea" opacity="0.6"/>
    <!-- Chart bars -->
    <g transform="translate(270, 20)">
      <rect x="0" y="60" width="14" height="40" rx="3" fill="#4ade80" opacity="0.8"/>
      <rect x="20" y="40" width="14" height="60" rx="3" fill="#60a5fa" opacity="0.8"/>
      <rect x="40" y="50" width="14" height="50" rx="3" fill="#f472b6" opacity="0.8"/>
      <rect x="60" y="20" width="14" height="80" rx="3" fill="#fbbf24" opacity="0.8"/>
      <rect x="80" y="35" width="14" height="65" rx="3" fill="#a78bfa" opacity="0.8"/>
    </g>
  </g>
  <!-- Title -->
  <text x="520" y="130" font-family="'Segoe UI',system-ui,sans-serif" font-size="72" font-weight="800" fill="#fff" letter-spacing="-1">
    StmtForge
  </text>
  <!-- Tagline -->
  <text x="520" y="175" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#a5b4fc" letter-spacing="1" opacity="0.9">
    Credit Card Statement Parser &amp; Analyzer for Indian Banks
  </text>
  <!-- Feature pills -->
  <g transform="translate(520, 200)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#667eea" opacity="0.25"/>
    <text x="55" y="20" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#a5b4fc" font-weight="600">Privacy-First</text>
    <rect x="120" y="0" width="100" height="30" rx="15" fill="#667eea" opacity="0.25"/>
    <text x="170" y="20" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#a5b4fc" font-weight="600">Bank Parsers</text>
    <rect x="230" y="0" width="90" height="30" rx="15" fill="#667eea" opacity="0.25"/>
    <text x="275" y="20" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#a5b4fc" font-weight="600">Local LLM</text>
    <rect x="330" y="0" width="80" height="30" rx="15" fill="#667eea" opacity="0.25"/>
    <text x="370" y="20" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#a5b4fc" font-weight="600">100% Offline</text>
    <rect x="420" y="0" width="110" height="30" rx="15" fill="#667eea" opacity="0.25"/>
    <text x="475" y="20" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#a5b4fc" font-weight="600">PDF → Insights</text>
  </g>
  <!-- Bottom accent -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
